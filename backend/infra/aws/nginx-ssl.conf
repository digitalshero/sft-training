# /etc/nginx/sites-available/shero-backend
# Production config — after running: certbot --nginx -d api.shero.in
# Replace api.shero.in with your actual API subdomain.

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api.shero.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.shero.in;

    # ── SSL (managed by Certbot) ───────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.shero.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.shero.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "SAMEORIGIN"   always;
    add_header X-Content-Type-Options     "nosniff"      always;
    add_header Referrer-Policy            "no-referrer-when-downgrade" always;

    # ── Upload size limit ──────────────────────────────────────────────────
    client_max_body_size 50M;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;

    # ── Proxy to Node.js ──────────────────────────────────────────────────
    location / {
        proxy_pass          http://127.0.0.1:4000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        'upgrade';
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_cache_bypass  $http_upgrade;

        # Timeouts for long-running requests (TTS, large uploads)
        proxy_read_timeout    300s;
        proxy_connect_timeout  75s;
        proxy_send_timeout    300s;
    }

    # Health check (no SSL termination overhead)
    location = /health {
        proxy_pass http://127.0.0.1:4000/health;
        access_log off;
        proxy_read_timeout 5s;
    }

    # ── Rate limiting for auth endpoints ──────────────────────────────────
    # Requires: limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    # in /etc/nginx/nginx.conf http block
    location /api/auth/signin {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header X-Real-IP $remote_addr;
        # limit_req zone=auth burst=5 nodelay;
    }
    location /api/auth/signup {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header X-Real-IP $remote_addr;
        # limit_req zone=auth burst=3 nodelay;
    }
}
