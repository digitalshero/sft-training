version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: shero-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shero
      POSTGRES_PASSWORD: shero_dev_pass
      POSTGRES_DB: shero_dev
    ports:
      - "5432:5432"
    volumes:
      - shero_postgres_data:/var/lib/postgresql/data

volumes:
  shero_postgres_data: